<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Panel Alumno</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#f4f6f9;
margin:0;
display:flex;
}

.sidebar{
width:220px;
background:#1f2d3d;
color:white;
height:100vh;
}

.sidebar h2{
text-align:center;
padding:20px;
}

.sidebar a{
display:block;
padding:15px;
cursor:pointer;
color:white;
transition:0.2s;
}

.sidebar a:hover{
background:#32465a;
padding-left:20px;
}

.sidebar a i{
margin-right:10px;
width:20px;
text-align:center;
}

.main{
flex:1;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
margin-bottom:20px;
}

img{
border-radius:10px;
}
</style>

</head>

<body>

<div class="sidebar">
<h2><i class="fa-solid fa-user-graduate"></i> Alumno</h2>

<a onclick="verPerfil()"><i class="fa-solid fa-user"></i>Mi Perfil</a>
<a onclick="verCalificaciones()"><i class="fa-solid fa-chart-column"></i>Calificaciones</a>
<a onclick="verTareas()"><i class="fa-solid fa-book"></i>Tareas</a>
<a onclick="verAsistencias()"><i class="fa-solid fa-calendar-check"></i>Asistencias</a>
<a onclick="descargarBoleta()"><i class="fa-solid fa-file-pdf"></i>Boleta</a>

<button onclick="CerrarSesion()" style="width:100%;padding:15px;background:none;border:none;color:#f87171;text-align:left;cursor:pointer;">
<i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión
</button>
</div>

<div class="main">
<div id="contenido"></div>
</div>

<script>

const API = "https://plataforma-escolar-production.up.railway.app"
const alumno_id = localStorage.getItem("alumno_id")

if(!alumno_id){
window.location.href="login.html"
}

// =============================
// PERFIL
// =============================

function verPerfil(){

fetch(API + "/alumno/" + alumno_id)

.then(res => res.json())

.then(data => {

let fotoURL = ""

if(data.foto){
if(data.foto.startsWith("http")){
fotoURL = data.foto
}else if(data.foto.startsWith("/uploads")){
fotoURL = API + data.foto
}else{
fotoURL = API + "/uploads/" + data.foto
}
}

document.getElementById("contenido").innerHTML = `

<div class="card">

<h2>Bienvenid@ ${data.nombre}</h2>

<p><b>Grado:</b> ${data.grado}</p>
<p><b>Grupo:</b> ${data.grupo}</p>

<img src="${fotoURL}" width="150">

</div>

`

})

}

// =============================
// CALIFICACIONES
// =============================

function verCalificaciones(){

fetch(API + "/calificaciones/" + alumno_id)

.then(res => res.json())

.then(data => {

console.log("CALIFICACIONES:", data)

if(!data || data.length === 0){
document.getElementById("contenido").innerHTML = `
<div class="card">
<h2>No hay calificaciones</h2>
</div>
`
return
}

let materias = []
let notas = []

data.forEach(c=>{
materias.push(c.materia)
notas.push(parseFloat(c.calificacion))
})

let html = `
<div class="card">
<h2>Mis Calificaciones</h2>
<canvas id="grafica"></canvas>
</div>
`

document.getElementById("contenido").innerHTML = html

const ctx = document.getElementById("grafica").getContext("2d")

new Chart(ctx,{
type:"bar",
data:{
labels:materias,
datasets:[{
label:"Calificaciones",
data:notas
}]
}
})

})

}

// =============================
// TAREAS
// =============================

function verTareas(){

fetch(API + "/tareas/" + alumno_id)

.then(res => res.json())

.then(data => {

let html = `<h2>Mis Tareas</h2>`

data.forEach(t=>{

let estado = t.archivo ? "✅ Entregada" : "❌ Pendiente"
let calificacion = t.calificacion ? "⭐ Calificación: "+t.calificacion : ""

html += `
<div class="card">

<h3>${t.titulo}</h3>

<p>${t.descripcion}</p>

<p><b>Entrega:</b> ${new Date(t.fecha).toLocaleDateString('es-MX')}</p>

<p>${estado}</p>
<p>${calificacion}</p>

${!t.archivo ? `
<input type="file" id="archivo${t.id}">
<br><br>
<button onclick="subirTarea(${t.id})">Subir tarea</button>
` : `<p>Archivo enviado</p>`}

</div>
`

})

document.getElementById("contenido").innerHTML = html

})

}

// =============================
// ASISTENCIAS
// =============================

function verAsistencias(){

fetch(API + "/asistencias/" + alumno_id)

.then(res => res.json())

.then(data => {

let html = "<div class='card'><h2>Asistencias</h2>"

data.forEach(a=>{
html += `<p>${new Date(a.fecha).toLocaleDateString('es-MX')} - ${a.estado}</p>`
})

html += "</div>"

document.getElementById("contenido").innerHTML = html

})

}

// =============================
// BOLETA
// =============================

function descargarBoleta(){

fetch(API + "/calificaciones/" + alumno_id)

.then(res => res.json())

.then(data => {

let contenido = `<h1>Boleta de Calificaciones</h1><hr>`

if(!data || data.length === 0){
contenido += "<p>No hay calificaciones</p>"
}else{
data.forEach(c=>{
contenido += `<p><b>${c.materia}:</b> ${parseFloat(c.calificacion)}</p>`
})
}

const ventana = window.open()
ventana.document.write(contenido)
ventana.print()

})

}

// =============================
// SUBIR TAREA
// =============================

function subirTarea(tarea_id){

const archivo = document.getElementById("archivo"+tarea_id).files[0]

const formData = new FormData()
formData.append("archivo", archivo)
formData.append("tarea_id", tarea_id)
formData.append("alumno_id", alumno_id)

fetch(API + "/entregar-tarea",{
method:"POST",
body:formData
})
.then(res=>res.text())
.then(data=>{
alert(data)
verTareas()
})

}

// =============================
// SESIÓN
// =============================

function CerrarSesion(){
localStorage.removeItem("alumno_id")
alert("Sesión cerrada")
window.location.href="login.html"
}

// =============================
// INICIO
// =============================

verPerfil()

</script>

</body>
</html>
