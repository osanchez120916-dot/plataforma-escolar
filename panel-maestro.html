<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Dashboard Maestro</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
background:#f4f6f9;
}

/* MENU */

.sidebar{
width:220px;
background:#1f2d3d;
color:white;
height:100vh;
}

.sidebar h2{
text-align:center;
padding:20px;
}

.sidebar a{
display:block;
padding:15px;
color:white;
text-decoration:none;
cursor:pointer;
}

.sidebar a:hover{
background:#32465a;
}

/* CONTENIDO */

.main{
flex:1;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px 20px;
background:#3498db;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

select{
    padding: 10px;
    margin: 5px;
    width: 200px;
}

.topbar{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    margin-bottom:20px;
}

.logout-btn{
    background:#e74c3c;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

.logout-btn:hover{
    background:#c0392b;
}

</style>

</head>

<body>

<!-- MENU -->

<div class="sidebar">

<h2>Maestro</h2>

<a onclick="mostrarDashboard()">Dashboard</a>
<a onclick="mostrarAlumnos()">Alumnos</a>
<a onclick="mostrarCalificaciones()">Calificaciones</a>
<a onclick="mostrarTareas()">Tareas</a>
<a onclick="mostrarAsistencias()">Asistencias</a>
<a onclick="verEntregas()">Tareas Entregadas</a>


</div>

<!-- CONTENIDO -->

<div class="main">

    <div class="topbar">
    <button class="logout-btn" onclick="cerrarSesion()">Cerrar sesión</button>
</div>

<div id="contenido"></div>

</div>

<script>

// DASHBOARD

function mostrarDashboard(){

document.getElementById("contenido").innerHTML = `

<div class="card">
<h2>Bienvenido Maestro</h2>
<p>Seleccione una opción del menú.</p>
</div>

`

}

const maestro_id = localStorage.getItem("maestro_id")

console.log("Maestro ID:", maestro_id)

// ALUMNOS

function mostrarAlumnos(){

fetch("/maestro/alumnos/" + maestro_id)

.then(res => res.json())

.then(data => {

let html = `

<div class="card">

<h2>Lista de alumnos</h2>

<table>

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Grado</th>
<th>Grupo</th>
</tr>

`

data.forEach(a=>{

html += `

<tr>
<td>${a.id}</td>
<td>${a.nombre}</td>
<td>${a.grado}</td>
<td>${a.grupo}</td>
</tr>

`

})

html += `</table></div>`

document.getElementById("contenido").innerHTML = html

})

}

// CALIFICACIONES

function mostrarCalificaciones(){

fetch("http://localhost:3001/maestro/alumnos/"+ maestro_id)

.then(res => res.json())

.then(data => {

let opciones = ""

data.forEach(a=>{
opciones += `<option value="${a.id}">${a.nombre} (${a.grado} ${a.grupo})</option>`
})

document.getElementById("contenido").innerHTML = `

<div class="card">

<h2>Agregar Calificación</h2>

<select id="alumno_id">
${opciones}
</select>

<br><br>

<input id="materia" placeholder="Materia">
<input id="calificacion" placeholder="Calificación">

<button onclick="guardar()">Guardar</button>

</div>

`

})

}

function guardar(){

const alumno_id = document.getElementById("alumno_id").value
const materia = document.getElementById("materia").value
const calificacion = document.getElementById("calificacion").value

fetch("http://localhost:3001/calificaciones",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
alumno_id,
materia,
calificacion
})

})

.then(res => res.text())
.then(data=> alert(data))

}

// ASIGNAR TAREAS POR GRADO Y GRUPO

function mostrarTareas(){

fetch("http://localhost:3001/maestro/alumnos/" + maestro_id)

.then(res=>res.json())

.then(data=>{

let grupos=[]

data.forEach(a=>{

let combo=a.grado+"|"+a.grupo

if(!grupos.includes(combo)){
grupos.push(combo)
}

})

let opciones=""

grupos.forEach(g=>{

let partes=g.split("|")

opciones+=`<option value="${partes[0]}|${partes[1]}">
${partes[0]} - Grupo ${partes[1]}
</option>`

})

document.getElementById("contenido").innerHTML=`

<div class="card">

<h2>Asignar Tarea</h2>

<label>Grupo</label>

<select id="grupo_completo">

${opciones}

</select>

<br><br>

<input id="titulo" placeholder="Título de tarea">

<input id="descripcion" placeholder="Descripción">

<input type="date" id="fecha">

<br><br>

<button onclick="guardarTarea()">Guardar</button>

</div>

`

})

}

function guardarTarea(){

const combo=document.getElementById("grupo_completo").value

const partes=combo.split("|")

const grado=partes[0]
const grupo=partes[1]

const titulo=document.getElementById("titulo").value
const descripcion=document.getElementById("descripcion").value
const fecha=document.getElementById("fecha").value

fetch("http://localhost:3001/tareas",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
grado,
grupo,
titulo,
descripcion,
fecha
})

})

.then(res=>res.text())

.then(data=>{

alert(data)

})

}

// ASISTENCIAS

function mostrarAsistencias(){

fetch("http://localhost:3001/maestro/alumnos/" + maestro_id)

.then(res => res.json())

.then(data => {

let opciones = ""

data.forEach(a=>{
opciones += `<option value="${a.id}">${a.nombre}</option>`
})

document.getElementById("contenido").innerHTML = `

<div class="card">

<h2>Registrar Asistencia</h2>

<select id="alumno_id">
${opciones}
</select>

<br><br>

<input type="date" id="fecha">

<select id="estado">
<option>Presente</option>
<option>Falta</option>
<option>Retardo</option>
</select>

<br><br>

<button onclick="guardarAsistencia()">Guardar</button>

</div>

`

})

}

function guardarAsistencia(){

const alumno_id = document.getElementById("alumno_id").value
const fecha = document.getElementById("fecha").value
const estado = document.getElementById("estado").value

fetch("http://localhost:3001/asistencias",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
alumno_id,
fecha,
estado
})

})

.then(res => res.text())
.then(data => alert(data))

}

// VER ENTREGAS

function verEntregas(){

fetch("http://localhost:3001/entregas")

.then(res=>res.json())

.then(data=>{

let html = `

<div class="card">

<h2>Tareas entregadas</h2>

<table>

<tr>
<th>Alumno</th>
<th>Tarea</th>
<th>Archivo</th>
<th>Calificación</th>
<th>Acción</th>
</tr>

`

data.forEach(e=>{

html += `

<tr>

<td>${e.nombre}</td>

<td>${e.titulo}</td>

<td>
<a href="http://localhost:3001/tareas/${e.archivo}" target="_blank">
Descargar
</a>
</td>

<td>${e.calificacion ?? "Sin calificar"}</td>

<td>

<input type="number" id="nota${e.id}" placeholder="Calificación">

<button onclick="calificar(${e.id})">
Guardar
</button>

</td>

</tr>

`

})

html += "</table></div>"

document.getElementById("contenido").innerHTML = html

})

}

function calificar(entrega_id){

const calificacion = document.getElementById("nota"+entrega_id).value

if(!calificacion){
alert("Pon una calificación we")
return
}

console.log("ID enviado:", entrega_id)
console.log("Nota enviada:", calificacion)

fetch("http://localhost:3001/calificar-tarea",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
entrega_id: Number(entrega_id),
calificacion: Number(calificacion)
})

})

.then(res=>res.text())
.then(data=>{
alert(data)
verEntregas()
})

}

function cerrarSesion(){
    localStorage.removeItem("maestro_id")
    window.location.href = "login.html"
}

mostrarDashboard()


</script>

</body>
</html>
