
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Dashboard Maestro</title>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
background:#f4f6f9;
}

.sidebar{
width:220px;
background:#1f2d3d;
color:white;
height:100vh;
}

.sidebar h2{
text-align:center;
padding:20px;
}

.sidebar a{
display:block;
padding:15px;
color:white;
text-decoration:none;
cursor:pointer;
}

.sidebar a:hover{
background:#32465a;
}

.main{
flex:1;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

button{
padding:10px 20px;
background:#3498db;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

.topbar{
display:flex;
justify-content:flex-end;
margin-bottom:20px;
}

.logout-btn{
background:#e74c3c;
padding:10px;
color:white;
border:none;
border-radius:5px;
}
</style>

</head>

<body>

<div class="sidebar">
<h2>Maestro</h2>
<a onclick="mostrarDashboard()">Dashboard</a>
<a onclick="mostrarAlumnos()">Alumnos</a>
<a onclick="mostrarCalificaciones()">Calificaciones</a>
<a onclick="mostrarTareas()">Tareas</a>
<a onclick="mostrarAsistencias()">Asistencias</a>
<a onclick="verEntregas()">Tareas Entregadas</a>
</div>

<div class="main">

<div class="topbar">
<button class="logout-btn" onclick="cerrarSesion()">Cerrar sesión</button>
</div>

<div id="contenido"></div>

</div>

<script>

// 🔥 URL BASE (LO IMPORTANTE)
const API = "https://plataforma-escolar-production.up.railway.app"

const maestro_id = localStorage.getItem("maestro_id")

if(!maestro_id){
alert("No hay sesión we")
window.location.href="login.html"
}

// DASHBOARD
function mostrarDashboard(){
document.getElementById("contenido").innerHTML = `
<div class="card">
<h2>Bienvenido Maestro</h2>
</div>`
}

// ALUMNOS
function mostrarAlumnos(){

fetch(API + "/maestro/alumnos/" + maestro_id)
.then(res=>res.json())
.then(data=>{

let html = `
<div class="card">
<h2>Lista de alumnos</h2>
<table>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Grado</th>
<th>Grupo</th>
</tr>
`

data.forEach(a=>{
html+=`
<tr>
<td>${a.id}</td>
<td>${a.nombre}</td>
<td>${a.grado}</td>
<td>${a.grupo}</td>
</tr>
`
})

html += "</table></div>"
document.getElementById("contenido").innerHTML = html

})

}

// CALIFICACIONES
function mostrarCalificaciones(){

fetch(API + "/maestro/alumnos/" + maestro_id)
.then(res=>res.json())
.then(data=>{

let opciones=""

data.forEach(a=>{
opciones+=`<option value="${a.id}">${a.nombre}</option>`
})

document.getElementById("contenido").innerHTML=`
<div class="card">
<h2>Agregar Calificación</h2>

<select id="alumno_id">${opciones}</select>

<br><br>

<input id="materia" placeholder="Materia">
<input id="calificacion" placeholder="Calificación">

<button onclick="guardar()">Guardar</button>
</div>
`

})

}

function guardar(){

fetch(API + "/calificaciones",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
alumno_id:document.getElementById("alumno_id").value,
materia:document.getElementById("materia").value,
calificacion:document.getElementById("calificacion").value
})
})
.then(res=>res.text())
.then(alert)

}

// TAREAS
function mostrarTareas(){

fetch(API + "/maestro/alumnos/" + maestro_id)
.then(res=>res.json())
.then(data=>{

let grupos=[]

data.forEach(a=>{
let g=a.grado+"|"+a.grupo
if(!grupos.includes(g)) grupos.push(g)
})

let opciones=""

grupos.forEach(g=>{
let p=g.split("|")
opciones+=`<option value="${p[0]}|${p[1]}">${p[0]} - ${p[1]}</option>`
})

document.getElementById("contenido").innerHTML=`
<div class="card">
<h2>Asignar tarea</h2>

<select id="grupo">${opciones}</select>

<br><br>

<input id="titulo" placeholder="Título">
<input id="descripcion" placeholder="Descripción">
<input type="date" id="fecha">

<br><br>

<button onclick="guardarTarea()">Guardar</button>
</div>
`

})

}

function guardarTarea(){

let p=document.getElementById("grupo").value.split("|")

fetch(API + "/tareas",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
grado:p[0],
grupo:p[1],
titulo:titulo.value,
descripcion:descripcion.value,
fecha:fecha.value
})
})
.then(res=>res.text())
.then(alert)

}

// ASISTENCIAS
function mostrarAsistencias(){

fetch(API + "/maestro/alumnos/" + maestro_id)
.then(res=>res.json())
.then(data=>{

let opciones=""

data.forEach(a=>{
opciones+=`<option value="${a.id}">${a.nombre}</option>`
})

document.getElementById("contenido").innerHTML=`
<div class="card">
<h2>Asistencia</h2>

<select id="alumno_id">${opciones}</select>

<input type="date" id="fecha">

<select id="estado">
<option>Presente</option>
<option>Falta</option>
</select>

<button onclick="guardarAsistencia()">Guardar</button>
</div>
`

})

}

function guardarAsistencia(){

fetch(API + "/asistencias",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
alumno_id:alumno_id.value,
fecha:fecha.value,
estado:estado.value
})
})
.then(res=>res.text())
.then(alert)

}

// ENTREGAS
function verEntregas(){

fetch(API + "/entregas")
.then(res=>res.json())
.then(data=>{

let html=`
<div class="card">
<h2>Tareas entregadas</h2>
<table>
<tr>
<th>Alumno</th>
<th>Tarea</th>
<th>Archivo</th>
</tr>
`

data.forEach(e=>{
html+=`
<tr>
<td>${e.nombre}</td>
<td>${e.titulo}</td>
<td><a href="${API}/tareas/${e.archivo}" target="_blank">Descargar</a></td>
</tr>
`
})

html+="</table></div>"
contenido.innerHTML=html

})

}

function cerrarSesion(){
localStorage.removeItem("maestro_id")
window.location.href="login.html"
}

mostrarDashboard()

</script>

</body>
</html>
```
